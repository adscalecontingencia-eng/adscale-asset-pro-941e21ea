<!doctype html>
<html lang="pt-BR">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AD Scale | Página não encontrada</title>
    <meta name="robots" content="noindex" />
    <style>
      :root { color-scheme: dark; --bg:#06111b; --surface:rgba(10,20,34,.82); --border:rgba(148,163,184,.16); --text:#f8fafc; --muted:#9fb0c3; --primary:#22c55e; --primaryStrong:#16a34a; }
      * { box-sizing: border-box; }
      body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(circle at top right, rgba(34,197,94,.14), transparent 30%), linear-gradient(180deg, #07111d 0%, #050b14 100%); }
      .card { width:min(760px,100%); border:1px solid var(--border); background:var(--surface); border-radius:22px; padding:30px; }
      h1 { margin:0 0 12px; font-size:clamp(2rem,5vw,3rem); line-height:1.05; }
      p { margin:0 0 18px; color:var(--muted); line-height:1.7; }
      .actions { display:flex; flex-wrap:wrap; gap:12px; }
      a { display:inline-flex; align-items:center; justify-content:center; min-height:50px; padding:0 18px; border-radius:12px; text-decoration:none; font-weight:800; }
      .primary { background:linear-gradient(135deg, var(--primary), var(--primaryStrong)); color:#04110a; }
      .secondary { border:1px solid var(--border); background:rgba(15,23,42,.58); color:var(--text); }
    </style>
  </head>

  </body>
</html>
