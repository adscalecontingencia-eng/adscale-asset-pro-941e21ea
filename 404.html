<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AD Scale — Página em atualização</title>
    <meta name="robots" content="noindex" />
    <style>
      :root { color-scheme: dark; --bg:#050816; --surface:rgba(15,23,42,.72); --border:rgba(148,163,184,.18); --text:#f8fafc; --muted:#94a3b8; --primary:#22c55e; }
      * { box-sizing: border-box; }
      body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background: radial-gradient(circle at top right, rgba(34,197,94,.14), transparent 30%), var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .card { width:min(760px,100%); border:1px solid var(--border); background:var(--surface); backdrop-filter: blur(14px); border-radius:20px; padding:28px; }
      h1 { margin:0 0 12px; font-size:clamp(2rem,5vw,3rem); line-height:1.05; }
      p { margin:0 0 18px; color:var(--muted); line-height:1.7; }
      .actions { display:flex; flex-wrap:wrap; gap:12px; }
      a { display:inline-flex; align-items:center; justify-content:center; min-height:48px; padding:0 18px; border-radius:12px; text-decoration:none; font-weight:700; }
      .primary { background:linear-gradient(135deg, var(--primary), #16a34a); color:#04110a; }
      .secondary { border:1px solid var(--border); background:rgba(15,23,42,.58); color:var(--text); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Página temporariamente em fallback</h1>
      <p>O GitHub Pages ainda está servindo a camada estática para esta rota. A home principal já tem conteúdo e o app completo volta assim que o deploy final propagar.</p>
      <div class="actions">
        <a class="primary" href="/">Ir para a home</a>
        <a class="secondary" href="https://wa.me/5531999999999" target="_blank" rel="noopener noreferrer">Falar com o time</a>
      </div>
    </main>
  </body>
</html>
